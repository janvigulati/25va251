<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //for loop


        let studentList=["janhvi","Harshita", "Hridya","isha"];
        for(let i=0;i<studentList.length;i++) {
            console.log(studentList[i]);
        }

        //while loop
        let x=0;
        while(x<studentList.length) {
            console.log(studentList[x]);
            x++;
        }

        //for....of
        for(let y of studentList) {
            console.log(y);
        }
    </script>
</body>
</html>
