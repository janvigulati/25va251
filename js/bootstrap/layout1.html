<!DOCTYPE html>
<html>
<head>

<title>Bootstrap Grid</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container">

    <!-- first row -->

    <div class="row my-2" style="height:100px;">

        <div class="col-lg-12 bg-secondary">
            <h2>Header</h2>
        </div>

    </div>

    <!-- second row -->

    <div class="row my-2" style="height:150px;">

        <div class="col-lg-4 bg-danger">
            <h2>Left</h2>
        </div>

        <div class="col-lg-8 bg-success">
            <h2>Right</h2>
        </div>

    </div>

    <!-- third row -->

    <div class="row my-2" style="height:350px;">

        <div class="col-lg-12 bg-info">
            <h2>left</h2>
        </div>
        <div class="col-lg-8">
            <div class="col-lg-12 bg-danger h=50">
                <h2>Top Right</h2>
            </div>
            <div class="col-lg-12 bg-info h=50"></div>
             <h2>Bottom Right</h2>
        </div>

    </div>

</div>

</body>
</html>
