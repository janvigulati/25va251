<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Experiment 01</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        header {
            height: 150px;
            background-color: rgb(142, 196, 243);
        }

        section,
        aside {
            height: 300px;
            background-color: rgb(189, 186, 186);
            text-align: center;

        }

        section {
            border-right: 2px solid black;
        }

        footer {
            height: 100px;
            text-align: center;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="row"><!--first row header-->
            <header class="col-lg-12">
                <h1 class="text-center">My Web Page</h1>
            </header>
        </div><!--end of first row header-->

        <div class="row"><!--second row navbar-->

            <nav class="col-lg-12 navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Navbar</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                        <div class="navbar-nav">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                            <a class="nav-link" href="#">About Us</a>
                            <a class="nav-link" href="#">Gallery</a>
                            <a class="nav-link" href="#">Contact Us</a>
                        </div>
                    </div>
                </div>
            </nav>
        </div><!--end of second row navbar-->

        <div class="row"><!--third row content-->
            <section class="col-lg-6">
                <h2>Main Content</h2>
            </section>
            <aside class="col-lg-6">
                <h2>Sidebar</h2>
            </aside>
        </div><!--end of third row content-->

        <div class="row"><!--fourth row footer-->
            <footer class="col-lg-12 bg-dark text-white">
                <h2>Footer</h2>
            </footer>
        </div><!--end of fourth row footer-->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
